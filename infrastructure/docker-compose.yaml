
# AdQuiz local development infrastructure
# Usage:
#   Start: docker-compose up -d
#   Stop:  docker-compose down
#   Wipe data: docker-compose down -v

# services:
#   service-name:          # what you call it inside Docker network
#     image: ...           # which Docker image to use
#     container_name: ...  # friendly name visible in Docker Desktop
#     environment: ...     # environment variables passed into the container
#     ports: ...           # "host:container" — maps your machine port to container port
#     volumes: ...         # persists data or mounts config files
#     healthcheck: ...     # tells Docker how to know if the service is truly ready
#     depends_on: ...      # waits for another service before starting

services: 
# ------------ Postgres --------------
# One container for two databases
#   content_db -> content service
#   analytics_db -> analytics service (created via init.sql)
  postgres:
    image: postgres:16-alpine
    container_name: adquiz-postgres
    environment:
      POSTGRES_USER: adquiz
      POSTGRES_PASSWORD: adquiz
      POSTGRES_DB: content_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adquiz -d content_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adquiz-network

  adminer:
    image: adminer
    container_name: adquiz-adminer
    ports:
      - "8100:8080" # Matches your screenshot port 8100
    networks:
      - adquiz-network

# --------- ZooKeeper ------------
  # Required by Kafka to manage broker coordination
  # Must start before Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: adquiz-zookeeper
    environment: 
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000 #  It controls how often Zookeeper checks if its connections are still alive. 
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adquiz-network

# --------- Kafka ------------
  # Message broker for quiz events
  # Publishes: ANSWER_SUBMITTED, SESSION_COMPLETED
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: adquiz-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports: 
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1 	# Unique ID for this broker
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092 # Two listeners — internal Docker + external local machine
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT # Security protocol per listener (PLAINTEXT for dev)
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT # which listener brokers use to talk to each other
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # set to 1 since we have only one broker in dev
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true # auto-create topics when producers first publish to them
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - adquiz-network

# -------- Keycloak ---------
  # Authentication server — manages login, registration, JWT tokens
  # Admin console: http://localhost:8180
  # Admin credentials: admin / admin
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: adquiz-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8180/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - adquiz-network

volumes: 
  postgres-data: # Persists Postgres data across container restarts

networks:
  adquiz-network:
    driver: bridge
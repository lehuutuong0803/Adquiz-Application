server:
  port: 8081

spring:
  application:
    name: content-service

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/content_db
    username: adquiz
    password: adquiz
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Kafka ────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: content-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.adquiz.*"
  # ── Security ──────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/adquiz

# ── AI Generation Service ─────────────────────────────────
ai-generation:
  service-url: http://localhost:8083
  question-threshold: 3

# ── Actuator ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info